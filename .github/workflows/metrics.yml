name: Metrics

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:

  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: midankalahon786
          filename: github-metrics.svg

          template: classic
          base: header, activity, community, repositories
          config_theme: dark

          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_languages_limit: 8

          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          plugin_stars: yes

          plugin_followup: yes
          plugin_followup_sections: user

          plugin_achievements: yes
          plugin_achievements_threshold: X

          plugin_activity: yes
          plugin_activity_limit: 5

  metrics-topics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: midankalahon786
          filename: metrics_plugin_topics.svg

          base: ""
          config_theme: dark
          plugin_topics: yes
          plugin_topics_limit: 20
          plugin_topics_mode: both

  metrics-anilist:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: midankalahon786
          filename: metrics_plugin_anilist.svg

          base: ""
          config_theme: dark
          plugin_anilist: yes
          plugin_anilist_user: midankalahon
          plugin_anilist_medias: anime, manga
          plugin_anilist_sections: favorites, characters
          plugin_anilist_limit: 4
          plugin_anilist_limit_characters: 22

  metrics-steam:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: midankalahon786
          filename: metrics_plugin_steam.svg

          base: ""
          config_theme: dark
          plugin_steam: yes
          plugin_steam_token: ${{ secrets.STEAM_API_TOKEN }}
          plugin_steam_user: "76561198831135017"
          plugin_steam_sections: player, most-played
          plugin_steam_games_limit: 5
          plugin_steam_recent_games_limit: 1
          plugin_steam_achievements_limit: 0

  metrics-spotify:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: midankalahon786
          filename: metrics_plugin_spotify.svg

          base: ""
          config_theme: dark
          plugin_music: yes
          plugin_music_provider: spotify
          plugin_music_mode: recent
          plugin_music_token: "${{ secrets.SPOTIFY_CLIENT_ID }}, ${{ secrets.SPOTIFY_CLIENT_SECRET }}, ${{ secrets.SPOTIFY_REFRESH_TOKEN }}"
          plugin_music_limit: 4
